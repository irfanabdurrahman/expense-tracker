name: Deploy Saku Finance

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json

      - name: Deploy Hosting + Firestore Rules
        run: firebase deploy --only hosting,firestore:rules --project saku-finance-4cb59
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json

      - name: Cleanup
        if: always()
        run: rm -f /tmp/sa.json
